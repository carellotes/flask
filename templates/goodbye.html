<style>
.all{
    /* border-top : 1px solid black; */
    /* border-bottom:1px solid black; */
    position:relative;
    width:600px;
    height:100%;
    display:flex;
    flex-direction: column;
    justify-content: center;
    flex-wrap: wrap;
    color:black;
    align-items:center;
}
*{
    box-sizing: border-box;
}
body{
    display:flex;
    justify-content: center;
    background : linear-gradient(to right,  rgba(172, 172, 172, 0.9), transparent);
}
.backlogo{position:absolute;
            bottom: 50%;
            left : 50%;
            transform: translate(-50%,50%);
            position:fixed;
            width : 300px;
            height:242.58px;
            z-index: 2;
            background-image: url(/static/img/back.png);
            background-size: contain;
}
h1{
    margin:70px;
    margin-bottom:40px;
}
.wrapper{
    background : linear-gradient(to bottom,  rgba(172, 172, 172, 0.9), transparent);
    /* padding : 10px; */
    margin-top:40px;
    margin-bottom:40px;
    padding-bottom:60px;
    border-top : 10px solid rgba(71, 68, 68,0.4);
    border-bottom:10px solid rgb(226, 220, 220);
    position:relative;
    /* width:600px; */
    height:100%;
    display:flex;
    /* flex-direction: column; */
    /* justify-content: center; */
    flex-wrap: wrap;
    color:black;
    /* align-items:center; */
    text-align: justify;
    /* background:white; */
}
.wrapper::after{
    content:' ';
    position: absolute;
    text-align: center;
    top : 290px;
    
    width: 100%;
    /* left : 10px; */
    /* border: 1px dashed rgb(238, 236, 236); */
    z-index: 13;
    /* height:100%; */
    

}
.b1{
    width:100%;
    height :100%;
    padding:10px;
    float: left;
    align-items: center;
    text-align: justify;
    
    /* background-color:rgb(0, 0, 0); */

}

.C2{
    margin-bottom:20px;
    width:100%;
    height:50px;
    /* background:red; */
    /* border:2px solid blue; */

}
a{
    text-decoration: none;
    letter-spacing:2px;
    transition:2s;


}
a:hover{
    
    letter-spacing:5px;
    /* font-size:20px; */
}


div.b1{
    /* text-align: center; */
    width:600px;
    height:100%;
    padding:25px;
    margin:10px;
    font-size : 16px;
    z-index: 10;
    overflow: hidden;
}
@media (max-width:600px){
    .wrapper{
        width:100%;
        padding:0px;

    }
    div.b1{
        
        width:100%;
        padding:10px;
}
}
@media (max-width:420px){
    .wrapper{
        width:100%;
        padding:0px;

    }
    div.b1{
        
        width:100%;
        padding:10px;
}
}
@media (max-width:380px){
    div.b1{
        width:100%;
}
}
@keyframes animate{
    0%{
        background-position:left 0px top 0px;
    }
    40%{
        background-position:left 800px top -80px;
    }
    70%{

    }
}
</style>
<body>
    <div class="all">
    <h1 class="c1">감사합니다.</h1>
    <div class="c2"><a href="/">HOME</a></div>
    
    <div class="wrapper"> 

    
        <div class="backlogo"></div>
        
        
        {% for x in content %}
            <div class="b1"><span class="white">{{x}}</span></div>
        {% endfor %}

       
        
        
        
        
        
    </div>
</div>
